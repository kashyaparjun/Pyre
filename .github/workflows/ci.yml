name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  test-and-package:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Elixir and OTP
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "27.3"

      - name: Sync Python dependencies
        # Install all optional extras so the pydantic-ai / crewai / langgraph
        # adapter smoke tests actually run in CI rather than being silently
        # skipped via pytest.importorskip.
        run: uv sync --all-extras --dev

      - name: Fetch Elixir dependencies
        working-directory: elixir/pyre_bridge
        run: mix deps.get

      - name: Run release gate
        run: uv run python scripts/release_gate.py
